<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WingMax</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F0E8; --card: #FFFFFF; --fg: #2D2B26; --muted: #7A756B;
    --accent: #DA7756; --green: #3E7A4F; --tan: #DDD1C0; --border: #E0D8CC;
    --mono: "SF Mono", Menlo, Consolas, monospace;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--fg); line-height: 1.6;
    min-height: 100vh; display: flex; align-items: flex-end; justify-content: center;
  }

  .page {
    max-width: 440px; width: 100%; padding: 24px 24px 48px;
    display: flex; flex-direction: column; gap: 20px; align-items: flex-start;
  }

  /* ── WingMax avatar ─────────────────── */
  .wingmax {
    display: flex; align-items: flex-end; gap: 12px; width: 100%;
  }

  .avatar {
    width: 44px; height: 44px; background: var(--accent); border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 16px; font-weight: 700; color: white;
    flex-shrink: 0; transition: transform 0.2s ease;
    user-select: none;
  }

  .avatar.bounce {
    animation: bounce 0.4s ease;
  }

  @keyframes bounce {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  /* Eye blink: > briefly becomes - */
  .avatar .eye { display: inline; }

  /* Working state: hide mouth, show dots */
  .avatar.working .mouth { display: none; }
  .avatar.working .dots { display: inline; }
  .avatar .dots { display: none; }

  .avatar .dots span {
    animation: dotPulse 1.4s ease-in-out infinite;
  }
  .avatar .dots span:nth-child(2) { animation-delay: 0.2s; }
  .avatar .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  /* ── Message history ─────────────────── */
  .history {
    margin-left: 56px; width: calc(100% - 56px);
    display: flex; flex-direction: column; gap: 8px;
    max-height: 240px; overflow-y: auto;
  }

  .history:empty { display: none; }

  .history-msg {
    font-size: 13px; line-height: 1.5; color: var(--muted);
    padding: 8px 14px;
    background: var(--bg); border-radius: 12px;
    border: 1px solid var(--border);
    animation: fadeIn 0.3s ease;
  }

  .history-msg .history-files {
    font-family: var(--mono); font-size: 11px; color: var(--tan);
    margin-top: 2px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Speech bubble ──────────────────── */
  .bubble {
    background: var(--card); border-radius: 18px 18px 18px 4px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(45,43,38,0.06);
    padding: 20px 24px; flex: 1; position: relative;
  }

  .bubble-text {
    font-size: 16px; line-height: 1.6; margin-bottom: 4px;
  }

  .bubble-text.muted { color: var(--muted); }

  .bubble-files {
    font-family: var(--mono); font-size: 12px; color: var(--tan);
  }

  /* ── Suggestion ─────────────────────── */
  .suggest {
    margin-left: 56px; width: calc(100% - 56px);
    background: var(--bg); border-radius: 12px;
    padding: 14px 18px; text-align: center;
    border: 1px dashed var(--border);
  }

  .suggest-label { font-size: 13px; color: var(--muted); margin-bottom: 4px; }

  .suggest-cmd {
    font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--fg);
  }

  /* ── Preview ────────────────────────── */
  .preview {
    display: none; width: 100%; margin-left: 0;
    background: var(--card); border-radius: 16px;
    border: 2px solid var(--green); box-shadow: 0 4px 16px rgba(62,122,79,0.10);
    overflow: hidden;
  }
  .preview.visible { display: block; animation: pop 0.5s ease-out; }

  @keyframes pop {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }

  .preview-bar {
    padding: 10px 20px; font-size: 13px; color: var(--green); font-weight: 600;
    border-bottom: 1px solid var(--border);
  }

  .preview iframe {
    width: 100%; height: 340px; border: none; background: white;
  }

  /* ── Footer ─────────────────────────── */
  .footer {
    margin-left: 56px; font-size: 12px; color: var(--tan);
  }

  .footer a { color: var(--muted); text-decoration: none; }
  .footer a:hover { color: var(--accent); }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  @media (max-width: 480px) {
    .page { padding: 16px 12px 32px; }
    .bubble { padding: 16px 18px; }
    .suggest, .footer { margin-left: 48px; width: calc(100% - 48px); }
    .avatar { width: 36px; height: 36px; font-size: 13px; border-radius: 10px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="wingmax">
    <div class="avatar" id="avatar" aria-hidden="true"><span class="eye">&gt;</span><span class="mouth">_</span><span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
    <div class="bubble">
      <div class="bubble-text" id="bubble-text">Hey! I'm WingMax. I'll keep you company while you use Claude Code over in your terminal.</div>
      <div class="bubble-files" id="bubble-files"></div>
    </div>
  </div>

  <div class="history" id="history"></div>

  <div class="suggest" id="suggest">
    <div class="suggest-label" id="suggest-label">In your terminal, try typing:</div>
    <div class="suggest-cmd" id="suggest-cmd">hello</div>
  </div>

  <div class="preview" id="preview">
    <div class="preview-bar">Here's what you made</div>
    <iframe id="preview-frame" title="Live preview" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>

  <div class="footer" id="footer">
    You can't break anything &middot; <a href="https://code.claude.com/docs/en/quickstart" target="_blank" rel="noopener">About Claude Code</a>
  </div>

</div>
<script>
(function() {
  'use strict';

  var POLL_MS = 800, DONE_MS = 4000, STATUS_URL = '/status.json', CONFIG_URL = '/config.json';
  var seenEvents = 0, phase = 'welcome', timer = null;
  var turnEvents = [], hasPreview = false, pvVer = 0, lastFC = 0;
  var mode = 'beginner'; // beginner or intermediate
  var lastWorkComment = '', workCommentShown = false;

  var MAX_HISTORY = 8;

  var avatar     = document.getElementById('avatar');
  var bubbleText = document.getElementById('bubble-text');
  var bubbleFiles = document.getElementById('bubble-files');
  var history    = document.getElementById('history');
  var suggest    = document.getElementById('suggest');
  var sugLabel   = document.getElementById('suggest-label');
  var sugCmd     = document.getElementById('suggest-cmd');
  var preview    = document.getElementById('preview');
  var pvFrame    = document.getElementById('preview-frame');
  var footer     = document.getElementById('footer');

  function pick(a) { return a[Math.floor(Math.random() * a.length)]; }

  var eyeEl = avatar.querySelector('.eye');

  // ── Load config (mode) ──
  fetch(CONFIG_URL).then(function(r) {
    if (!r.ok) return;
    return r.json();
  }).then(function(cfg) {
    if (cfg && cfg.mode) mode = cfg.mode;
    applyMode();
  }).catch(function() {});

  function applyMode() {
    if (mode === 'intermediate') {
      footer.innerHTML = 'Claude Code docs &middot; <a href="https://code.claude.com/docs/en/quickstart" target="_blank" rel="noopener">Quickstart</a>';
    }
  }

  // ── Avatar expressions ──
  function avatarWorking() {
    avatar.className = 'avatar working';
  }

  function avatarDone() {
    avatar.className = 'avatar bounce';
    blink();
  }

  function blink() {
    eyeEl.textContent = '-';
    setTimeout(function() { eyeEl.textContent = '>'; }, 200);
  }

  function scheduleIdleBlink() {
    var delay = 8000 + Math.random() * 12000;
    setTimeout(function() {
      if (phase !== 'working') blink();
      scheduleIdleBlink();
    }, delay);
  }
  scheduleIdleBlink();

  var lastBubbleText = '';
  var lastBubbleFiles = '';

  function pushToHistory(text, files) {
    if (!text || text === 'Claude\u2019s on it\u2026') return;
    // Dedup: don't repeat the same message consecutively
    var last = history.lastElementChild;
    if (last && last.firstChild && last.firstChild.textContent === text) return;
    var msg = document.createElement('div');
    msg.className = 'history-msg';
    msg.textContent = text;
    if (files) {
      var f = document.createElement('div');
      f.className = 'history-files';
      f.textContent = files;
      msg.appendChild(f);
    }
    history.appendChild(msg);
    // Trim old messages
    while (history.children.length > MAX_HISTORY) {
      history.removeChild(history.firstChild);
    }
    history.scrollTop = history.scrollHeight;
  }

  function say(text, muted) {
    bubbleText.textContent = text;
    bubbleText.className = 'bubble-text' + (muted ? ' muted' : '');
  }

  // ── Turn-level signal aggregation ──
  function extractTurnSignals(evts) {
    var langs = {}, fileCats = {}, bashCats = {};
    var hasTestFail = false, hasBuildFail = false, hasError = false;
    var testSummary = '', errorHint = '';
    var totalLines = 0;

    evts.forEach(function(e) {
      var s = e.signals || {};
      if (s.lang) langs[s.lang] = true;
      if (s.file_category) fileCats[s.file_category] = true;
      if (s.category) bashCats[s.category] = true;
      if (s.exit_ok === false) hasError = true;
      if (s.category === 'test' && s.exit_ok === false) hasTestFail = true;
      if (s.category === 'build' && s.exit_ok === false) hasBuildFail = true;
      if (s.test_summary && !testSummary) testSummary = s.test_summary;
      if (s.error_hint && !errorHint) errorHint = s.error_hint;
      if (s.line_count) totalLines += s.line_count;
    });

    return {
      languages: Object.keys(langs),
      fileCategories: Object.keys(fileCats),
      bashCategories: Object.keys(bashCats),
      hasTestFailure: hasTestFail,
      hasBuildFailure: hasBuildFail,
      hasError: hasError,
      testSummary: testSummary,
      errorHint: errorHint,
      totalLines: totalLines
    };
  }

  // ── During-work commentary (signal-aware) ──
  function workComment(evts) {
    var reads = 0, writes = 0, edits = 0, cmds = 0, searches = 0, agents = 0, webs = 0;
    evts.forEach(function(e) {
      if (e.type === 'file_read') reads++;
      if (e.type === 'file_create') writes++;
      if (e.type === 'file_edit') edits++;
      if (e.type === 'command') cmds++;
      if (e.type === 'search') searches++;
      if (e.type === 'agent') agents++;
      if (e.type === 'web') webs++;
    });

    var total = evts.length;
    var sig = extractTurnSignals(evts);

    if (mode === 'beginner') {
      // Signal-driven commentary first
      if (sig.hasTestFailure)
        return 'Claude ran the tests and some didn\u2019t pass. It\u2019ll probably try to fix that now.';
      if (sig.hasBuildFailure)
        return 'The build didn\u2019t work first time \u2014 Claude\u2019s figuring out why.';
      if (sig.hasError)
        return 'Something didn\u2019t go as expected \u2014 Claude\u2019s working through it.';
      if (sig.languages.length > 0 && reads >= 4)
        return 'Claude\u2019s reading through your ' + sig.languages[0] + ' files \u2014 getting the full picture.';
      if (agents > 0)
        return pick([
          'Claude just asked a helper for extra research. Teamwork!',
          'Claude\u2019s getting help from a specialist \u2014 this might take a moment.',
        ]);
      if (reads >= 6 && writes === 0 && edits === 0)
        return 'Lots of reading \u2014 Claude likes to understand what\u2019s there before it acts.';
      if (webs > 0)
        return 'Claude\u2019s checking something online for you.';
      if (total >= 10)
        return 'Claude\u2019s been busy \u2014 this is a bigger task. Hang tight!';
    } else {
      // Intermediate: signal-driven, specific
      if (sig.hasTestFailure && sig.testSummary)
        return 'Tests failing: ' + sig.testSummary + '. Claude will iterate.';
      if (sig.hasTestFailure)
        return 'Test failure detected. Claude\u2019s likely about to fix it.';
      if (sig.hasBuildFailure && sig.errorHint)
        return 'Build broke: ' + sig.errorHint.substring(0, 50);
      if (sig.hasBuildFailure)
        return 'Build failed. Claude\u2019s debugging.';
      if (sig.hasError && sig.errorHint)
        return 'Error: ' + sig.errorHint.substring(0, 60);
      if (sig.languages.length >= 2)
        return 'Working across ' + sig.languages.join(' and ') + '.';
      if (sig.totalLines > 500 && reads >= 3)
        return 'Heavy context loading \u2014 ' + sig.totalLines + ' lines read. Claude\u2019s building a mental model.';
      if (agents > 0)
        return 'Subagent spawned \u2014 Claude\u2019s delegating part of this task.';
      if (reads >= 6 && writes === 0 && edits === 0)
        return reads + ' files read, no writes yet. Reconnaissance phase.';
      if (searches >= 4)
        return searches + ' searches. Claude\u2019s finding its way around.';
      if (total >= 10)
        return 'Big task \u2014 ' + total + ' tool calls so far.';
    }

    return ''; // Nothing noteworthy yet
  }

  // ── Done commentary (what Claude did) ──
  function unique(arr) {
    var seen = {};
    return arr.filter(function(x) { return seen[x] ? false : (seen[x] = true); });
  }

  function comment(evts) {
    var createdRaw = [], editedRaw = [], hasRead = false, hasCmd = false, hasSearch = false, hasWeb = false;
    evts.forEach(function(e) {
      if (e.type === 'file_create' && e.detail) createdRaw.push(e.detail);
      if (e.type === 'file_edit' && e.detail) editedRaw.push(e.detail);
      if (e.type === 'file_read') hasRead = true;
      if (e.type === 'command') hasCmd = true;
      if (e.type === 'search') hasSearch = true;
      if (e.type === 'web') hasWeb = true;
    });
    var created = unique(createdRaw);
    var edited = unique(editedRaw);
    var sig = extractTurnSignals(evts);
    var hasHtml = created.some(function(f) { return f.endsWith('.html'); });
    var readCount = evts.filter(function(e) { return e.type === 'file_read'; }).length;
    var totalEvts = evts.length;
    var langStr = sig.languages.length > 0 ? sig.languages.join(' and ') : '';

    if (mode === 'beginner') {
      // Signal-driven commentary first
      if (sig.hasTestFailure && sig.testSummary)
        return 'Claude ran the tests: ' + sig.testSummary + '. It\u2019ll keep working on this.';
      if (sig.hasTestFailure)
        return 'Some tests didn\u2019t pass. Claude will probably try to fix them.';
      if (sig.bashCategories.indexOf('test') >= 0 && !sig.hasTestFailure)
        return pick([
          'Claude ran the tests and everything passed \u2014 that\u2019s the green light!',
          'Tests all passing. That means the code is doing what it should.',
        ]);
      if (sig.hasBuildFailure)
        return 'The build didn\u2019t work first time \u2014 Claude\u2019s figuring out why.';
      // Then fall through to existing pattern-based commentary
      if (hasHtml)
        return pick([
          'Oh nice \u2014 Claude just built you a website! Have a look below.',
          'There you go \u2014 a whole website! Check it out below.',
        ]);
      if (created.length > 0 && langStr)
        return 'Claude just wrote some ' + langStr + ' for you. It\u2019s saved on your computer.';
      if (created.length > 0 && (hasRead || hasSearch))
        return pick([
          'Claude read your files first, then made something new. It always checks what\u2019s there before creating.',
          'Nice \u2014 Claude checked what you had, then created something based on it.',
        ]);
      if (created.length > 0)
        return pick([
          'There you go \u2014 Claude just made that for you. It\u2019s saved on your computer.',
          'Done! Claude created that for you \u2014 it\u2019s a real file you can open.',
        ]);
      if (edited.length > 0 && langStr)
        return 'Claude updated your ' + langStr + ' files. Only the bits that needed changing.';
      if (edited.length > 0)
        return pick([
          'Claude just updated your files. Only the bits that needed changing.',
          'Done \u2014 Claude made those changes for you.',
        ]);
      if (hasWeb)
        return 'Claude went online and looked some things up for you.';
      if (hasCmd)
        return pick([
          'Claude just ran a command on your computer \u2014 that\u2019s how it sets things up.',
          'Claude ran a command for you. Don\u2019t worry \u2014 it always asks permission first.',
        ]);
      if (hasRead || hasSearch)
        return pick([
          'Claude had a read through your files. Sometimes it just needs to understand what\u2019s there.',
          'Claude looked through your files to get the full picture.',
        ]);
      return 'All done!';
    } else {
      // Intermediate mode: signal-driven, then pattern-based, then tips
      // Test results are the highest-signal commentary
      if (sig.hasTestFailure && sig.testSummary)
        return 'Tests failing: ' + sig.testSummary + '. Check the output.';
      if (sig.hasTestFailure)
        return 'Test failure. Check the terminal for details.';
      if (sig.bashCategories.indexOf('test') >= 0 && !sig.hasTestFailure)
        return 'Tests green. Good time for /commit.';
      if (sig.hasBuildFailure && sig.errorHint)
        return 'Build broke \u2014 ' + sig.errorHint.substring(0, 50);
      if (sig.hasBuildFailure)
        return 'Build failed. Check the terminal.';
      if (sig.hasError && sig.errorHint)
        return 'Hit an error: ' + sig.errorHint.substring(0, 50);

      // File changes with language context
      if (hasHtml)
        return 'Built ' + created.filter(function(f) { return f.endsWith('.html'); }).join(', ') + ' \u2014 preview below.';
      if (created.length > 0 && edited.length > 0) {
        var msg = 'Created and edited files';
        if (langStr) msg += ' (' + langStr + ')';
        return msg + '. Good time for /commit.';
      }
      if (created.length > 0 && readCount >= 3)
        return 'Read first, then created. That read-before-write pattern reduces mistakes.';
      if (created.length > 0 && langStr)
        return 'New ' + langStr + ' file' + (created.length > 1 ? 's' : '') + '. Worth a look before moving on.';
      if (created.length > 0)
        return 'New file' + (created.length > 1 ? 's' : '') + ' on disk. Worth a look.';
      if (edited.length > 0 && totalEvts > 8)
        return 'Big edit session' + (langStr ? ' (' + langStr + ')' : '') + '. /commit before moving on.';
      if (edited.length > 0 && langStr)
        return 'Edited ' + langStr + '. Check the diff if you\u2019re curious.';
      if (edited.length > 0)
        return 'Quick edit done. If it\u2019s not right, just say.';

      // Non-file-change turns
      if (sig.languages.length >= 2)
        return 'Cross-stack work \u2014 touched ' + langStr + ' this turn.';
      if (hasWeb)
        return 'Web lookup done. Claude does this when it wants current info rather than guessing.';
      if (readCount >= 6)
        return 'Big read pass \u2014 ' + sig.totalLines + ' lines. Claude\u2019s building context.';

      // CC tips for quiet turns
      return pick([
        'Tip: /compact frees up context when the conversation gets long.',
        'Tip: Claude remembers this session. Reference earlier work by name.',
        'Tip: if Claude\u2019s going the wrong direction, just interrupt.',
        'Tip: /commit saves your work to git. Good habit after progress.',
        'Tip: ask Claude to explain any file \u2014 "explain [filename]".',
        'Tip: specific instructions work best. "Make the button blue" beats "improve the UI".',
      ]);
    }
  }

  function listFiles(evts) {
    var names = {};
    evts.forEach(function(e) {
      if ((e.type === 'file_create' || e.type === 'file_edit') && e.detail) names[e.detail] = true;
    });
    return Object.keys(names).join('  ');
  }

  // ── Suggestions per mode (signal-aware) ──
  function nextSuggestion(evts) {
    var hasCreated = evts.some(function(e) { return e.type === 'file_create'; });
    var hasEdited = evts.some(function(e) { return e.type === 'file_edit'; });
    var sig = extractTurnSignals(evts);

    if (mode === 'beginner') {
      if (sig.hasTestFailure) return pick(['ask Claude to fix the tests', 'explain what went wrong']);
      if (sig.hasBuildFailure) return pick(['ask Claude what happened', 'try a different approach']);
      if (hasCreated) return pick([
        'adjust the tone', 'check it for mistakes', 'explain what you just made',
        'try something completely different', 'make it shorter'
      ]);
      if (hasEdited) return pick([
        'change something else', 'undo that', 'check it over',
        'explain what changed', 'try something new'
      ]);
      return pick([
        'save that to a file', 'explain that in simpler terms',
        'try something different', 'help me write an email',
        'organise my files'
      ]);
    } else {
      if (sig.hasTestFailure) return pick(['check the test output', 'run tests again', 'ask Claude to fix it']);
      if (sig.hasBuildFailure) return pick(['look at the error', 'try a different approach']);
      if (sig.bashCategories.indexOf('test') >= 0 && !sig.hasTestFailure) return '/commit';
      if (hasCreated) return pick([
        'review the diff', '/commit', 'run the tests',
        'refactor for readability'
      ]);
      if (hasEdited) return pick([
        'check git diff', '/commit', 'run tests',
        'explain the change'
      ]);
      if (sig.fileCategories.indexOf('config') >= 0) return 'check the config is right';
      return pick([
        '/compact \u2014 context might be getting full',
        'ask Claude to explain this codebase',
        'run the test suite', 'check git status'
      ]);
    }
  }

  function welcomeSuggestion() {
    if (mode === 'beginner') {
      return pick([
        'help me draft an email to my team',
        'make me a simple website about space',
        'organise the files in this folder',
        'summarise this document for me',
        'help me plan my week',
        'explain what\u2019s in this folder'
      ]);
    } else {
      return pick([
        'explain this codebase to me',
        'refactor the auth flow',
        'write tests for the API',
        'find all TODO comments',
        'review recent git changes',
        'set up CI for this project'
      ]);
    }
  }

  function showPreview(fl) {
    if (hasPreview && fl.length === lastFC) return;
    // Only preview genuine project HTML files, not companion/config files
    var projectHtml = fl.filter(function(f) {
      return f.endsWith('.html') && f !== 'wingmax.html' && f !== 'sample-preview.html';
    });
    if (projectHtml.length === 0) return;
    var f = projectHtml[0];
    pvVer++;
    var url = '/preview/' + encodeURIComponent(f) + '?v=' + pvVer;
    // Check the file exists before showing preview
    fetch(url, { method: 'HEAD' }).then(function(r) {
      if (!r.ok) return;
      pvFrame.src = url;
      if (!hasPreview) { preview.classList.add('visible'); hasPreview = true; }
    }).catch(function() {});
  }

  function onDone() {
    avatarDone();
    var c = comment(turnEvents);
    var files = listFiles(turnEvents);
    if (c) {
      // Only update bubble if there's something worth saying
      say(c, false);
      bubbleFiles.textContent = files;
    } else {
      // Nothing interesting — just show files if any, or keep previous bubble
      if (files) {
        bubbleFiles.textContent = files;
      }
      bubbleText.className = 'bubble-text';
    }
    sugLabel.textContent = 'You could try:';
    sugCmd.textContent = nextSuggestion(turnEvents);
    suggest.style.display = '';
    workCommentShown = false;
    phase = 'done';
  }

  function resetTimer() {
    if (timer) clearTimeout(timer);
    timer = setTimeout(function() { if (phase === 'working') onDone(); }, DONE_MS);
  }

  function poll() {
    fetch(STATUS_URL).then(function(r) {
      if (!r.ok) throw new Error();
      return r.json();
    }).then(function(data) {
      var evts = data.events || [], fl = data.files_touched || [];
      var hasHtml = data.has_html || false, stopped = data.stopped || false;
      var real = evts.filter(function(e) { return e.type !== 'hello'; });
      var hasHello = evts.length > real.length;

      if (hasHello && phase === 'welcome') {
        phase = 'ready';
        if (mode === 'beginner') {
          say('Claude Code is ready! Ask it anything \u2014 write an email, build something, organise your files, look something up. Whatever you need.', false);
        } else {
          say('Claude Code is ready. What are we working on?', false);
        }
        sugLabel.textContent = 'Try typing:';
        sugCmd.textContent = welcomeSuggestion();
      }

      if (real.length > seenEvents) {
        if (phase !== 'working') {
          // Push previous done message to history before starting new task
          // Don't push the ready/welcome messages — they're not useful history
          if (phase === 'done') {
            pushToHistory(bubbleText.textContent, bubbleFiles.textContent);
          }
          turnEvents = [];
          phase = 'working';
          avatarWorking();
          if (mode === 'beginner') {
            say('Claude\u2019s on it\u2026', true);
            bubbleFiles.textContent = '';
          }
          // Intermediate: keep previous bubble visible — the avatar dots show working state
          suggest.style.display = 'none';
          workCommentShown = false;
        }
        real.slice(0, real.length - seenEvents).forEach(function(e) { turnEvents.push(e); });
        seenEvents = real.length;
        resetTimer();

        // During-work commentary: update if something noteworthy
        var wc = workComment(turnEvents);
        if (wc && wc !== lastWorkComment) {
          say(wc, true);
          lastWorkComment = wc;
          workCommentShown = true;
        }
      }

      if (stopped && phase === 'working') {
        if (timer) clearTimeout(timer);
        onDone();
      }

      if (hasHtml) showPreview(fl);
      lastFC = fl.length;
    }).catch(function() {});
  }

  setInterval(poll, POLL_MS);
  poll();
})();
</script>
</body>
</html>
